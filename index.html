<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.16);
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #a09d98;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Layout ── */
  .page { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── Header ── */
  .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 40px; height: 40px; background: var(--text); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-mark svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 1.8; }
  .header-title { font-size: 20px; font-weight: 600; color: var(--text); cursor: pointer; }
  .header-title:hover { opacity: 0.7; }
  .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* ── Toolbar ── */
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text);
    cursor: pointer; transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--border-hover); background: var(--surface2); box-shadow: var(--shadow); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.38; cursor: not-allowed; pointer-events: none; }
  .btn-primary { background: var(--text); color: white; border-color: transparent; }
  .btn-primary:hover { background: #333; border-color: transparent; }
  .btn-danger { color: var(--danger); border-color: rgba(220,38,38,0.2); }
  .btn-danger:hover { background: var(--danger-bg); border-color: rgba(220,38,38,0.3); }
  .btn .icon { font-size: 15px; line-height: 1; }

  /* ── Hint bar ── */
  .hint-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 12px; color: var(--text2); margin-bottom: 1.25rem;
  }
  .hint-bar svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.5; }

  /* ── Cards Grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem 1rem;
    cursor: pointer;
    transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
    position: relative;
    user-select: none;
    animation: fadeIn 0.25s ease both;
  }
  .card:hover { box-shadow: var(--shadow-hover); border-color: var(--border-hover); transform: translateY(-1px); }
  .card.selected { border-color: var(--accent); background: var(--accent-bg); }
  .card.selected:hover { border-color: var(--accent); }
  .card.dragging { opacity: 0.35; transform: scale(0.97); }
  .card.drag-over { border: 2px dashed var(--accent); }

  .card-checkbox {
    position: absolute; top: 12px; right: 12px;
    width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent);
  }
  .card-icon { font-size: 22px; margin-bottom: 10px; line-height: 1; }
  .card-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 3px; padding-right: 22px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-url { font-size: 11px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-desc {
    font-size: 12px; color: var(--text2); margin-top: 8px;
    line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1 / -1; text-align: center;
    padding: 5rem 2rem; color: var(--text3);
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
  .empty-state small { font-size: 13px; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(2px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 1rem;
    animation: fadeIn 0.15s ease;
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.75rem;
    width: 100%; max-width: 500px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: slideUp 0.2s ease;
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .modal-header h2 { font-size: 17px; font-weight: 600; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text3); line-height: 1; padding: 2px; }
  .modal-close:hover { color: var(--text); }

  .form-group { margin-bottom: 1.1rem; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.02em; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 9px 12px;
    font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  .form-group textarea { resize: vertical; min-height: 76px; line-height: 1.6; }

  /* ── Icon picker ── */
  .icon-grid {
    display: grid; grid-template-columns: repeat(9, 1fr); gap: 5px; margin-top: 6px;
    max-height: 148px; overflow-y: auto; padding-right: 2px;
  }
  .icon-btn {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 18px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface2); cursor: pointer; transition: all 0.12s;
  }
  .icon-btn:hover { border-color: var(--border-hover); background: var(--surface); transform: scale(1.1); }
  .icon-btn.active { border-color: var(--accent); background: var(--accent-bg); }

  /* ── Color picker ── */
  .color-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .color-swatch {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.15s, box-shadow 0.15s;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.active { box-shadow: 0 0 0 3px var(--accent); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(12px);
    background: var(--text); color: white;
    padding: 10px 20px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    z-index: 300; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Animations ── */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Scrollbar ── */
  .icon-grid::-webkit-scrollbar { width: 4px; }
  .icon-grid::-webkit-scrollbar-track { background: transparent; }
  .icon-grid::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }
</style>
</head>
<body>

<div class="page">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
      </div>
      <div>
        <div class="header-title" id="dashTitle" onclick="openSettings()" title="클릭해서 제목 변경">업무 대시보드</div>
        <div class="header-sub" id="dashSub">나의 업무 링크 모음</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="openAdd()">
        <span class="icon">＋</span> 새 카드 추가
      </button>
      <button class="btn" id="editBtn" disabled onclick="openEdit()">
        <span class="icon">✎</span> 수정
      </button>
      <button class="btn btn-danger" id="deleteBtn" disabled onclick="deleteSelected()">
        <span class="icon">✕</span> 삭제
      </button>
      <button class="btn" onclick="openSettings()" title="설정">
        <span class="icon">⚙</span>
      </button>
    </div>
  </div>

  <!-- Hint -->
  <div class="hint-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    카드를 클릭하면 링크로 이동합니다. 드래그해서 순서를 변경하고, 체크박스로 선택 후 수정·삭제할 수 있습니다.
  </div>

  <!-- Cards -->
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="cardModal" style="display:none" onclick="if(event.target===this)closeCardModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">새 카드 추가</h2>
      <button class="modal-close" onclick="closeCardModal()">×</button>
    </div>

    <div class="form-group">
      <label>제목 *</label>
      <input type="text" id="fTitle" placeholder="예: 2학년 성적 관리" maxlength="40" />
    </div>
    <div class="form-group">
      <label>링크 URL *</label>
      <input type="url" id="fUrl" placeholder="https://docs.google.com/..." />
    </div>
    <div class="form-group">
      <label>설명 (선택)</label>
      <textarea id="fDesc" placeholder="이 카드에 대한 간단한 설명을 입력하세요" maxlength="120"></textarea>
    </div>

    <div class="form-group">
      <label>아이콘</label>
      <div class="icon-grid" id="iconGrid"></div>
    </div>

    <div class="form-group">
      <label>카드 색상</label>
      <div class="color-grid" id="colorGrid"></div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeCardModal()">취소</button>
      <button class="btn btn-primary" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-header">
      <h2>대시보드 설정</h2>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div class="form-group">
      <label>대시보드 제목</label>
      <input type="text" id="sTitle" placeholder="업무 대시보드" maxlength="30" />
    </div>
    <div class="form-group">
      <label>부제목</label>
      <input type="text" id="sSub" placeholder="나의 업무 링크 모음" maxlength="40" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSettings()">취소</button>
      <button class="btn btn-primary" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Constants ──────────────────────────────────────────────
const ICONS = [
  '📊','📋','📝','📁','📂','🗂️','📌','📎','🔗','📐',
  '📏','🧮','📈','📉','📄','📃','📑','🗒️','🗓️','📅',
  '📆','🏫','🎓','👩‍🏫','👨‍🏫','✏️','🖊️','📚','📖','🔬',
  '🔭','🧪','🧬','💡','⚙️','🔧','🛠️','🖥️','💻','📱',
  '🖨️','📡','🔑','🏆','🎯','📣','📢','🔔','⭐','💼',
  '🗃️','🗄️','📮','📬','📧','💬','🌐','🏠','🏢','🎨',
];

const COLORS = [
  { name: '기본 흰색',     bg: '#ffffff', border: 'rgba(0,0,0,0.08)' },
  { name: '파스텔 블루',   bg: '#dbeafe', border: '#bfdbfe' },
  { name: '파스텔 그린',   bg: '#dcfce7', border: '#bbf7d0' },
  { name: '파스텔 옐로',   bg: '#fef9c3', border: '#fef08a' },
  { name: '파스텔 핑크',   bg: '#fce7f3', border: '#fbcfe8' },
  { name: '파스텔 퍼플',   bg: '#ede9fe', border: '#ddd6fe' },
  { name: '파스텔 오렌지', bg: '#ffedd5', border: '#fed7aa' },
  { name: '파스텔 민트',   bg: '#ccfbf1', border: '#99f6e4' },
  { name: '라이트 그레이', bg: '#f1f5f9', border: '#e2e8f0' },
  { name: '스카이',        bg: '#e0f2fe', border: '#bae6fd' },
  { name: '라임',          bg: '#ecfccb', border: '#d9f99d' },
  { name: '로즈',          bg: '#ffe4e6', border: '#fecdd3' },
];

// ── State ──────────────────────────────────────────────────
let cards = [];
let selected = new Set();
let editingId = null;
let curIcon = '📊';
let curColor = COLORS[0];
let dragSrcIdx = null;

// ── Persistence ────────────────────────────────────────────
function load() {
  try {
    const d = localStorage.getItem('dashboard_v2');
    if (d) { const p = JSON.parse(d); cards = p.cards || []; }
    const t = localStorage.getItem('dashboard_title');
    const s = localStorage.getItem('dashboard_sub');
    if (t) { document.getElementById('dashTitle').textContent = t; document.getElementById('sTitle').value = t; }
    if (s) { document.getElementById('dashSub').textContent = s; document.getElementById('sSub').value = s; }
  } catch(e) { cards = []; }
  if (!cards.length) {
    cards = [
      { id: uid(), icon: '📊', title: '업무 현황판',  url: 'https://docs.google.com/spreadsheets', desc: '전체 업무 현황을 한눈에 관리', color: COLORS[0] },
      { id: uid(), icon: '📅', title: '연간 일정표',  url: 'https://docs.google.com/spreadsheets', desc: '학사 일정 및 행사 계획 관리', color: COLORS[1] },
      { id: uid(), icon: '📋', title: '학생 명단',    url: 'https://docs.google.com/spreadsheets', desc: '학년별 학생 정보 통합 관리', color: COLORS[2] },
    ];
  }
}

function save() {
  try { localStorage.setItem('dashboard_v2', JSON.stringify({ cards })); } catch(e) {}
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// ── Render ─────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  if (!cards.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>아직 카드가 없습니다</p>
        <small>상단의 "새 카드 추가" 버튼으로 시작해보세요</small>
      </div>`;
    return;
  }

  cards.forEach((card, i) => {
    const isSel = selected.has(card.id);
    const c = card.color || COLORS[0];
    const el = document.createElement('div');
    el.className = 'card' + (isSel ? ' selected' : '');
    el.draggable = true;
    el.dataset.id = card.id;
    el.dataset.idx = i;
    el.style.background = c.bg;
    el.style.borderColor = isSel ? 'var(--accent)' : c.border;
    el.innerHTML = `
      <input type="checkbox" class="card-checkbox" ${isSel ? 'checked' : ''}>
      <div class="card-icon">${card.icon}</div>
      <div class="card-title">${esc(card.title)}</div>
      <div class="card-url">${esc(trimUrl(card.url))}</div>
      ${card.desc ? `<div class="card-desc">${esc(card.desc)}</div>` : ''}
    `;
    el.querySelector('.card-checkbox').addEventListener('change', (e) => {
      e.stopPropagation();
      if (e.target.checked) selected.add(card.id); else selected.delete(card.id);
      updateToolbar(); render();
    });
    el.addEventListener('click', (e) => {
      if (e.target.type === 'checkbox') return;
      window.open(card.url, '_blank');
    });
    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragover',  onDragOver);
    el.addEventListener('drop',      onDrop);
    el.addEventListener('dragend',   onDragEnd);
    grid.appendChild(el);
  });
}

function trimUrl(url) {
  try { const u = new URL(url); return u.hostname + (u.pathname !== '/' ? u.pathname.slice(0,30) : ''); }
  catch(e) { return url.slice(0, 40); }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Toolbar ────────────────────────────────────────────────
function updateToolbar() {
  const n = selected.size;
  document.getElementById('editBtn').disabled   = n !== 1;
  document.getElementById('deleteBtn').disabled = n === 0;
}

// ── Drag & Drop ────────────────────────────────────────────
function onDragStart(e) {
  dragSrcIdx = parseInt(e.currentTarget.dataset.idx);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  const tgt = parseInt(e.currentTarget.dataset.idx);
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcIdx === null || dragSrcIdx === tgt) return;
  const [moved] = cards.splice(dragSrcIdx, 1);
  cards.splice(tgt, 0, moved);
  save(); render();
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
  dragSrcIdx = null;
}

// ── Icon Grid ──────────────────────────────────────────────
function buildIconGrid() {
  const g = document.getElementById('iconGrid');
  g.innerHTML = '';
  ICONS.forEach(ic => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'icon-btn' + (ic === curIcon ? ' active' : '');
    b.textContent = ic;
    b.title = ic;
    b.onclick = () => { curIcon = ic; buildIconGrid(); };
    g.appendChild(b);
  });
}

// ── Color Grid ─────────────────────────────────────────────
function buildColorGrid() {
  const g = document.getElementById('colorGrid');
  g.innerHTML = '';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c.bg === curColor.bg ? ' active' : '');
    s.style.background = c.bg;
    s.style.border = `2px solid ${c.border}`;
    s.title = c.name;
    s.onclick = () => { curColor = c; buildColorGrid(); };
    g.appendChild(s);
  });
}

// ── Add Modal ──────────────────────────────────────────────
function openAdd() {
  editingId = null; curIcon = '📊'; curColor = COLORS[0];
  document.getElementById('modalTitle').textContent = '새 카드 추가';
  document.getElementById('fTitle').value = '';
  document.getElementById('fUrl').value   = '';
  document.getElementById('fDesc').value  = '';
  buildIconGrid(); buildColorGrid();
  document.getElementById('cardModal').style.display = 'flex';
  setTimeout(() => document.getElementById('fTitle').focus(), 50);
}

// ── Edit Modal ─────────────────────────────────────────────
function openEdit() {
  const id   = [...selected][0];
  const card = cards.find(c => c.id === id);
  if (!card) return;
  editingId = id;
  curIcon  = card.icon;
  curColor = card.color || COLORS[0];
  document.getElementById('modalTitle').textContent = '카드 수정';
  document.getElementById('fTitle').value = card.title;
  document.getElementById('fUrl').value   = card.url;
  document.getElementById('fDesc').value  = card.desc || '';
  buildIconGrid(); buildColorGrid();
  document.getElementById('cardModal').style.display = 'flex';
}

function closeCardModal() { document.getElementById('cardModal').style.display = 'none'; }

// ── Save Card ──────────────────────────────────────────────
function saveCard() {
  const title = document.getElementById('fTitle').value.trim();
  const url   = document.getElementById('fUrl').value.trim();
  const desc  = document.getElementById('fDesc').value.trim();
  if (!title) { toast('제목을 입력해주세요'); document.getElementById('fTitle').focus(); return; }
  if (!url)   { toast('URL을 입력해주세요');  document.getElementById('fUrl').focus();   return; }

  if (editingId) {
    const idx = cards.findIndex(c => c.id === editingId);
    if (idx > -1) cards[idx] = { id: editingId, icon: curIcon, title, url, desc, color: curColor };
    selected.clear(); toast('수정되었습니다');
  } else {
    cards.push({ id: uid(), icon: curIcon, title, url, desc, color: curColor });
    toast('카드가 추가되었습니다');
  }
  save(); render(); updateToolbar(); closeCardModal();
}

// ── Delete ─────────────────────────────────────────────────
function deleteSelected() {
  if (!selected.size) return;
  if (!confirm(`선택한 카드 ${selected.size}개를 삭제할까요?`)) return;
  cards = cards.filter(c => !selected.has(c.id));
  selected.clear(); save(); render(); updateToolbar();
  toast('삭제되었습니다');
}

// ── Settings ───────────────────────────────────────────────
function openSettings() {
  document.getElementById('sTitle').value = document.getElementById('dashTitle').textContent;
  document.getElementById('sSub').value   = document.getElementById('dashSub').textContent;
  document.getElementById('settingsModal').style.display = 'flex';
}
function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
function saveSettings() {
  const t = document.getElementById('sTitle').value.trim() || '업무 대시보드';
  const s = document.getElementById('sSub').value.trim()   || '나의 업무 링크 모음';
  document.getElementById('dashTitle').textContent = t;
  document.getElementById('dashSub').textContent   = s;
  try { localStorage.setItem('dashboard_title', t); localStorage.setItem('dashboard_sub', s); } catch(e) {}
  closeSettings(); toast('설정이 저장되었습니다');
}

// ── Toast ──────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Keyboard shortcuts ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCardModal(); closeSettings(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    if (document.getElementById('cardModal').style.display === 'flex') saveCard();
  }
});

// ── Init ───────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
